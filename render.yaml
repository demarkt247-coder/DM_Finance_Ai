services:
  - type: web
    name: dm-finance-bot
    runtime: node
    plan: free
    rootDir: bot
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: MANIFEST_SHEET_ID
        sync: false
      - key: QUESTION_HOUR
        value: "20"
      - key: QUESTION_MINUTE
        value: "0"
      - key: TIMEZONE
        value: Asia/Dhaka
